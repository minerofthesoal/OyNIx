<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient: deep purple to violet -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>

    <!-- Face/orb gradient -->
    <radialGradient id="faceGrad" cx="0.5" cy="0.55" r="0.5">
      <stop offset="0%" stop-color="#6a3d9a"/>
      <stop offset="60%" stop-color="#4a2080"/>
      <stop offset="100%" stop-color="#2d1250"/>
    </radialGradient>

    <!-- Glow effect -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#7c4dff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4a148c" stop-opacity="0"/>
    </radialGradient>

    <!-- Ear gradient (left) -->
    <linearGradient id="earL" x1="0" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#6a3d9a"/>
      <stop offset="100%" stop-color="#9c4dcc"/>
    </linearGradient>

    <!-- Ear gradient (right) -->
    <linearGradient id="earR" x1="1" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#6a3d9a"/>
      <stop offset="100%" stop-color="#9c4dcc"/>
    </linearGradient>

    <!-- Inner ear pink -->
    <linearGradient id="innerEar" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#f48fb1"/>
    </linearGradient>

    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e1bee7"/>
      <stop offset="50%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </radialGradient>

    <!-- Rim light -->
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7c4dff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c4dff" flood-opacity="0.5"/>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="url(#rim)" stroke-width="3"/>

  <!-- Ambient glow behind face -->
  <circle cx="256" cy="280" r="180" fill="url(#glow)" filter="url(#softGlow)"/>

  <!-- Left cat ear -->
  <path d="M 138 210 L 110 80 L 195 165 Z" fill="url(#earL)" filter="url(#shadow)"/>
  <path d="M 143 200 L 122 105 L 186 170 Z" fill="url(#innerEar)" opacity="0.5"/>

  <!-- Right cat ear -->
  <path d="M 374 210 L 402 80 L 317 165 Z" fill="url(#earR)" filter="url(#shadow)"/>
  <path d="M 369 200 L 390 105 L 326 170 Z" fill="url(#innerEar)" opacity="0.5"/>

  <!-- Main face / orb -->
  <ellipse cx="256" cy="290" rx="140" ry="145" fill="url(#faceGrad)" filter="url(#shadow)"/>
  <ellipse cx="256" cy="290" rx="140" ry="145" fill="none" stroke="url(#rim)" stroke-width="2"/>

  <!-- Left eye -->
  <ellipse cx="210" cy="270" rx="28" ry="32" fill="#1a0a2e"/>
  <ellipse cx="210" cy="270" rx="22" ry="26" fill="url(#eyeGlow)"/>
  <ellipse cx="210" cy="265" rx="10" ry="12" fill="#e1bee7"/>
  <circle cx="204" cy="258" r="5" fill="white" opacity="0.8"/>

  <!-- Right eye -->
  <ellipse cx="302" cy="270" rx="28" ry="32" fill="#1a0a2e"/>
  <ellipse cx="302" cy="270" rx="22" ry="26" fill="url(#eyeGlow)"/>
  <ellipse cx="302" cy="265" rx="10" ry="12" fill="#e1bee7"/>
  <circle cx="296" cy="258" r="5" fill="white" opacity="0.8"/>

  <!-- Small nose -->
  <ellipse cx="256" cy="310" rx="8" ry="5" fill="#ce93d8" opacity="0.7"/>

  <!-- Mouth / smile -->
  <path d="M 235 325 Q 246 340 256 340 Q 266 340 277 325" fill="none" stroke="#ce93d8" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Whiskers (left) -->
  <line x1="115" y1="285" x2="180" y2="300" stroke="#b388ff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="118" y1="305" x2="180" y2="310" stroke="#b388ff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="122" y1="325" x2="182" y2="318" stroke="#b388ff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Whiskers (right) -->
  <line x1="397" y1="285" x2="332" y2="300" stroke="#b388ff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="394" y1="305" x2="332" y2="310" stroke="#b388ff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="390" y1="325" x2="330" y2="318" stroke="#b388ff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- "OyNIx" text at bottom -->
  <text x="256" y="430" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="48" font-weight="bold" fill="#e1bee7" letter-spacing="4">
    <tspan fill="#b388ff">Oy</tspan><tspan fill="#e1bee7">NI</tspan><tspan fill="#7c4dff">x</tspan>
  </text>
</svg>
