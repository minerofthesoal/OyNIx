app-id: io.github.oynix.browser
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: oynix-launch
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-download
  - --env=QTWEBENGINE_CHROMIUM_FLAGS=--no-sandbox

modules:
  # KDE 6.7 runtime already has: Python 3, PyQt6, Qt6 WebEngine
  - name: python3-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app
          'whoosh>=2.7.4'
          'beautifulsoup4>=4.12.0'
          'requests>=2.31.0'
          'Pillow>=10.0.0'
          'huggingface-hub>=0.20.0'
    sources: []

  - name: python3-llama-cpp
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        CMAKE_ARGS: '-DGGML_BLAS=OFF -DGGML_CUDA=OFF'
    build-commands:
      - pip3 install --prefix=/app 'llama-cpp-python>=0.2.0' || echo 'llama-cpp-python build failed (optional)'
    sources: []

  - name: oynix
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/oynix
      - cp -r oynix /app/lib/oynix/
      - cp pyproject.toml /app/lib/oynix/
      - cp requirements.txt /app/lib/oynix/

      # Native turbo indexer
      - g++ -O2 -shared -fPIC -std=c++17
          -o /app/lib/oynix/build/libnyx_index.so
          src/native/fast_index.cpp 2>/dev/null
          && mkdir -p /app/lib/oynix/build || true

      # Launcher script
      - mkdir -p /app/bin
      - install -Dm755 flatpak/oynix-launch /app/bin/oynix-launch

      # Desktop file
      - install -Dm644 oynix.desktop /app/share/applications/io.github.oynix.browser.desktop
      - sed -i 's|Exec=oynix.*|Exec=oynix-launch %u|' /app/share/applications/io.github.oynix.browser.desktop
      - sed -i 's|Icon=oynix|Icon=io.github.oynix.browser|' /app/share/applications/io.github.oynix.browser.desktop

      # Icons
      - for size in 256 128 64 48; do
          icon="assets/icon-${size}.png";
          if [ -f "$icon" ]; then
            install -Dm644 "$icon" "/app/share/icons/hicolor/${size}x${size}/apps/io.github.oynix.browser.png";
          fi;
        done

      # AppStream metadata
      - install -Dm644 flatpak/io.github.oynix.browser.metainfo.xml
          /app/share/metainfo/io.github.oynix.browser.metainfo.xml

    sources:
      - type: dir
        path: ..
