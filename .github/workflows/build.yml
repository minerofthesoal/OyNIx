name: Build Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.1.0)'
        default: '1.1.0'
        required: false

permissions:
  contents: write

jobs:
  # ── Compute version string ──────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            RAW="${{ github.ref_name }}"
            CLEAN="$(echo "$RAW" | sed 's/[. ]*$//')"
            echo "version=$CLEAN" >> "$GITHUB_OUTPUT"
          else
            echo "version=v${{ github.event.inputs.version || '1.1.0' }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Debian .deb (C++ / CMake) ───────────────────────────────────────
  build-deb:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev fakeroot gcc g++ cmake ninja-build pkg-config \
            libsqlite3-dev libnss3-dev libxcomposite-dev libxrandr-dev \
            libgl1-mesa-dev libegl1-mesa-dev

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtwebengine qtwebchannel qtpositioning'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # global.json pins SDK 8.0 — verify it's active
      - name: Verify .NET SDK
        run: dotnet --version

      - name: Build .deb
        env:
          DOTNET_ROOT: ${{ env.DOTNET_ROOT }}
        run: |
          chmod +x scripts/build-deb.sh
          QT_PREFIX="${Qt6_DIR}" ./scripts/build-deb.sh "${{ needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  # ── Windows .exe (C++ / CMake + MSVC) ───────────────────────────────
  build-exe:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtwebengine qtwebchannel qtpositioning'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SQLite3 via vcpkg
        shell: pwsh
        run: |
          vcpkg install sqlite3:x64-windows
          echo "SQLITE3_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Build with CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Package .exe
        shell: pwsh
        run: |
          $v = "${{ needs.prepare.outputs.version }}" -replace '^v',''
          New-Item -ItemType Directory -Path "dist" -Force
          # Find the binary (MSVC puts it under Release/)
          $exe = Get-ChildItem -Path "build" -Recurse -Filter "oynix.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "dist/OyNIx.exe"
          }
          # Copy C# NativeAOT DLL
          $dll = Get-ChildItem -Path "build/dotnet" -Filter "OyNIxCore.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName "dist/" }
          # Use windeployqt to gather Qt runtime
          if (Get-Command windeployqt6 -ErrorAction SilentlyContinue) {
            windeployqt6 --release --no-translations "dist/OyNIx.exe"
          } elseif (Get-Command windeployqt -ErrorAction SilentlyContinue) {
            windeployqt --release --no-translations "dist/OyNIx.exe"
          }
          Compress-Archive -Path "dist/*" -DestinationPath "OyNIx-${v}-windows.zip"
          Copy-Item "dist/OyNIx.exe" "OyNIx-${v}-windows.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: exe-package
          path: |
            *.exe
            *.zip

  # ── Flatpak (C++ / CMake) ──────────────────────────────────────────
  build-flatpak:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install KDE runtime + SDK
        run: |
          flatpak install --user -y --noninteractive flathub \
            org.kde.Platform//6.8 \
            org.kde.Sdk//6.8

      - name: Build Flatpak
        run: |
          cd flatpak
          flatpak-builder --user --install-deps-from=flathub \
            --force-clean --disable-rofiles-fuse \
            build io.github.oynix.browser.yml

      - name: Export bundle
        run: |
          cd flatpak
          flatpak build-export repo build
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION="${VERSION#v}"
          flatpak build-bundle repo \
            "OyNIx-${VERSION}.flatpak" \
            io.github.oynix.browser
          mv "OyNIx-${VERSION}.flatpak" ../

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-package
          path: '*.flatpak'

  # ── Arch Linux pacman (C++ / CMake) ─────────────────────────────────
  build-pacman:
    needs: prepare
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git cmake qt6-webengine qt6-webchannel \
            sqlite dotnet-sdk-8.0 gcc

      - uses: actions/checkout@v4

      - name: Build pacman package
        run: |
          chmod +x scripts/build-pacman.sh
          ./scripts/build-pacman.sh "${{ needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: pacman-package
          path: '*.pkg.tar.*'
          if-no-files-found: warn

  # ── Release ──────────────────────────────────────────────────────────
  release:
    needs: [prepare, build-deb, build-exe, build-flatpak, build-pacman]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check if any build succeeded
        id: check
        run: |
          deb="${{ needs.build-deb.result }}"
          exe="${{ needs.build-exe.result }}"
          fpk="${{ needs.build-flatpak.result }}"
          pac="${{ needs.build-pacman.result }}"
          echo "deb=$deb exe=$exe flatpak=$fpk pac=$pac"
          if [ "$deb" = "success" ] || [ "$exe" = "success" ] || [ "$fpk" = "success" ] || [ "$pac" = "success" ]; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            echo "All builds failed, skipping release."
          fi

      - name: Download artifacts
        if: steps.check.outputs.has_artifacts == 'true'
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
        continue-on-error: true

      - name: List built artifacts
        if: steps.check.outputs.has_artifacts == 'true'
        run: ls -lh *.deb *.exe *.zip *.flatpak *.pkg.tar.* 2>/dev/null || echo "Some artifacts missing"

      - name: Create or get tag
        if: steps.check.outputs.has_artifacts == 'true'
        id: tag
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "OyNIx ${{ steps.tag.outputs.version }}"
          body: |
            ## OyNIx Browser ${{ steps.tag.outputs.version }}

            Built with C++17, Qt6 WebEngine, and .NET 8 NativeAOT.

            ### Downloads
            - **Debian/Ubuntu**: `.deb` package — `sudo dpkg -i oynix-*.deb`
            - **Windows**: `.exe` / `.zip` — extract and run OyNIx.exe
            - **Flatpak**: `.flatpak` bundle — `flatpak install --user OyNIx-*.flatpak`
            - **Arch Linux**: `.pkg.tar.zst` — `sudo pacman -U oynix-*.pkg.tar.zst`

            ---
            *Coded by Claude (Anthropic)*
          files: |
            *.deb
            *.exe
            *.zip
            *.flatpak
            *.pkg.tar.*
          fail_on_unmatched_files: false
          make_latest: true

      - name: Fail summary
        if: steps.check.outputs.has_artifacts != 'true'
        run: |
          echo "## Build Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "All platform builds failed. Check individual job logs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Debian | ${{ needs.build-deb.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Windows | ${{ needs.build-exe.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flatpak | ${{ needs.build-flatpak.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Arch | ${{ needs.build-pacman.result }} |" >> "$GITHUB_STEP_SUMMARY"
