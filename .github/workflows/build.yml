name: Build Packages

on:
  push:
    tags: ['v*']
    branches: ['main', 'claude/*']
  pull_request:
    branches: ['main']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 3.1.0)'
        default: '3.1.0'
        required: false

permissions:
  contents: write

env:
  QT_VERSION: '6.8.3'
  DOTNET_VERSION: '8.0.x'

jobs:
  # ── Compute version string ──────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            RAW="${{ github.ref_name }}"
            CLEAN="$(echo "$RAW" | sed 's/[. ]*$//')"
            echo "version=$CLEAN" >> "$GITHUB_OUTPUT"
          else
            echo "version=v${{ github.event.inputs.version || '3.1.0' }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Ubuntu/Mint apt package (.deb via dpkg-buildpackage) ────────────
  build-deb:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper devscripts dpkg-dev fakeroot \
            gcc g++ cmake ninja-build pkg-config \
            libsqlite3-dev libnss3-dev libnspr4-dev \
            libxcomposite-dev libxdamage-dev libxrandr-dev libxtst-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-xcb-dev libxcb1-dev libxext-dev libxfixes-dev \
            libgl1-mesa-dev libegl1-mesa-dev libdrm-dev libgbm-dev \
            libfontconfig1-dev libfreetype6-dev libglib2.0-dev \
            libdbus-1-dev libasound2-dev libpulse-dev libexpat1-dev \
            libwayland-dev

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtwebengine qtwebchannel qtpositioning'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify toolchain
        run: |
          echo "=== Build Environment ==="
          echo "CMake:    $(cmake --version | head -1)"
          echo "Ninja:    $(ninja --version 2>/dev/null || echo 'not found')"
          echo "GCC:      $(g++ --version | head -1)"
          echo ".NET:     $(dotnet --version)"
          echo "dh:       $(dh --version 2>/dev/null | head -1 || echo 'not found')"
          echo "Qt root:  ${QT_ROOT_DIR:-unset}"
          echo "Qt6 dir:  ${Qt6_DIR:-unset}"

          # Verify Qt prefix
          QT_PREFIX="${QT_ROOT_DIR:-}"
          if [ -z "$QT_PREFIX" ] && [ -n "${Qt6_DIR:-}" ]; then
            QT_PREFIX="$(cd "${Qt6_DIR}/../../.." 2>/dev/null && pwd)"
          fi
          echo "QT_PREFIX: ${QT_PREFIX}"
          if [ -n "$QT_PREFIX" ] && [ -d "$QT_PREFIX/lib" ]; then
            echo "  Qt libs found: $(ls "${QT_PREFIX}/lib/"libQt6Core.so* 2>/dev/null | head -1)"
          fi

      - name: Build apt package
        env:
          QT_PREFIX: ${{ env.QT_ROOT_DIR }}
        run: |
          chmod +x scripts/build-deb.sh debian/rules debian/bundle-qt.sh
          ./scripts/build-deb.sh "${{ needs.prepare.outputs.version }}"

      - name: Verify .deb
        run: |
          DEB=$(ls *.deb 2>/dev/null | head -1)
          if [ -z "$DEB" ]; then
            echo "::error::No .deb file produced"
            exit 1
          fi
          echo "=== Package ==="
          dpkg-deb --info "$DEB"
          echo ""
          echo "=== Binary files ==="
          dpkg-deb --contents "$DEB" 2>/dev/null \
            | grep -E '(oynix|\.so|\.desktop)' | head -20 || true
          echo ""
          echo "=== Size ==="
          du -sh "$DEB"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  # ── Ubuntu compile check (no packaging) ──────────────────────────────
  build-ubuntu-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ cmake ninja-build pkg-config \
            libsqlite3-dev libnss3-dev libnspr4-dev \
            libxcomposite-dev libxdamage-dev libxrandr-dev libxtst-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-xcb-dev libxcb1-dev libxext-dev libxfixes-dev \
            libgl1-mesa-dev libegl1-mesa-dev libdrm-dev libgbm-dev \
            libfontconfig1-dev libfreetype6-dev libglib2.0-dev \
            libdbus-1-dev libasound2-dev libpulse-dev libexpat1-dev \
            libwayland-dev

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtwebengine qtwebchannel qtpositioning'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: CMake configure
        run: |
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Verify binary
        run: |
          if [ ! -f build/oynix ]; then
            echo "::error::Binary not found after build"
            exit 1
          fi
          echo "Binary: $(file build/oynix)"
          echo "Size:   $(du -sh build/oynix | awk '{print $1}')"
          echo "Libs:   $(ldd build/oynix | grep -c '=>')"

          # List Qt dependencies
          echo ""
          echo "=== Qt6 dependencies ==="
          ldd build/oynix | grep -i qt | head -20

          # Check C# core
          if [ -f build/dotnet/OyNIxCore.so ]; then
            echo ""
            echo "=== C# NativeAOT core ==="
            echo "Size: $(du -sh build/dotnet/OyNIxCore.so | awk '{print $1}')"
          fi

  # ── Windows .exe (C++ / MSVC) ──────────────────────────────────────
  build-exe:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtwebengine qtwebchannel qtpositioning'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install SQLite3 via vcpkg
        shell: pwsh
        run: |
          vcpkg install sqlite3:x64-windows
          echo "SQLITE3_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Build with CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Package .exe
        shell: pwsh
        run: |
          $v = "${{ needs.prepare.outputs.version }}" -replace '^v',''
          New-Item -ItemType Directory -Path "dist" -Force

          # Find the built binary
          $exe = Get-ChildItem -Path "build" -Recurse -Filter "oynix.exe" |
            Select-Object -First 1
          if (-not $exe) {
            Write-Error "oynix.exe not found in build output"
            exit 1
          }
          Copy-Item $exe.FullName "dist/OyNIx.exe"

          # Copy C# NativeAOT DLL if present
          $dll = Get-ChildItem -Path "build/dotnet" -Filter "OyNIxCore.dll" `
            -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName "dist/" }

          # Use windeployqt to gather Qt runtime
          $wdq = $null
          if (Get-Command windeployqt6 -ErrorAction SilentlyContinue) {
            $wdq = "windeployqt6"
          } elseif (Get-Command windeployqt -ErrorAction SilentlyContinue) {
            $wdq = "windeployqt"
          }
          if ($wdq) {
            & $wdq --release --no-translations "dist/OyNIx.exe"
          } else {
            Write-Warning "windeployqt not found — Qt DLLs may be missing"
          }

          Compress-Archive -Path "dist/*" -DestinationPath "OyNIx-${v}-windows.zip"
          Copy-Item "dist/OyNIx.exe" "OyNIx-${v}-windows.exe"

          # Summary
          Get-ChildItem "OyNIx-*" | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1MB, 1)) MB)"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: exe-package
          path: |
            *.exe
            *.zip

  # ── Arch Linux pacman ───────────────────────────────────────────────
  build-pacman:
    needs: prepare
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git cmake ninja qt6-webengine qt6-webchannel sqlite gcc

          # Install .NET SDK — package name varies by Arch mirror timing
          pacman -S --noconfirm dotnet-sdk-8.0 2>/dev/null \
            || pacman -S --noconfirm dotnet-sdk 2>/dev/null \
            || echo "WARNING: .NET SDK not available — C# core will be skipped"

      - uses: actions/checkout@v4

      - name: Build pacman package
        run: |
          chmod +x scripts/build-pacman.sh
          ./scripts/build-pacman.sh "${{ needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: pacman-package
          path: '*.pkg.tar.*'
          if-no-files-found: warn

  # ── Release ──────────────────────────────────────────────────────────
  release:
    needs: [prepare, build-deb, build-exe, build-pacman]
    if: always() && (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || startsWith(github.ref_name, 'claude/'))
    runs-on: ubuntu-latest
    steps:
      - name: Check if any build succeeded
        id: check
        run: |
          deb="${{ needs.build-deb.result }}"
          exe="${{ needs.build-exe.result }}"
          pac="${{ needs.build-pacman.result }}"
          echo "Results: deb=$deb exe=$exe pac=$pac"
          if [ "$deb" = "success" ] || [ "$exe" = "success" ] || [ "$pac" = "success" ]; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            echo "::warning::All builds failed — no release will be created"
          fi
          # Pre-release for non-tag builds
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        if: steps.check.outputs.has_artifacts == 'true'
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
        continue-on-error: true

      - name: List artifacts
        if: steps.check.outputs.has_artifacts == 'true'
        run: |
          echo "=== Built artifacts ==="
          ls -lh *.deb *.exe *.zip *.pkg.tar.* 2>/dev/null || echo "Some artifacts missing"

      - name: Resolve tag
        if: steps.check.outputs.has_artifacts == 'true'
        id: tag
        run: echo "version=${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "OyNIx ${{ steps.tag.outputs.version }}"
          prerelease: ${{ steps.check.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## OyNIx Browser ${{ steps.tag.outputs.version }}

            Custom Chromium-based browser with C++17, Qt6 WebEngine, and .NET 8 NativeAOT core.

            ### Features
            - **Nyx Search Engine** — local FTS5 index + web results
            - **Source Labels** — OYN, Nyx, OYN+, Nyx+ result badges
            - **Native Web Crawler** — BFS crawler with language filter & robots.txt
            - **AI Assistant** — Ollama / OpenAI integration
            - **Tree Tabs** — domain-grouped sidebar
            - **Glass UI** — modern frosted glass internal pages
            - **Command Palette** — VS Code-style Ctrl+K launcher
            - **Community DB** — JSONL export for community contributions

            ### Install

            | Platform | Command |
            |----------|---------|
            | **Ubuntu/Mint** | `sudo apt install ./oynix-*.deb` |
            | **Arch Linux** | `sudo pacman -U oynix-*.pkg.tar.zst` |
            | **Windows** | Extract `.zip` or run `.exe` directly |

            ### Build from source (Ubuntu/Mint)
            ```bash
            ./scripts/build-ubuntu.sh --deps-only   # install dependencies
            ./scripts/build-ubuntu.sh                # build
            ./scripts/build-ubuntu.sh --install      # install to ~/.local
            ```

            ---
            *Built with Qt6 WebEngine + C++17 + .NET 8 NativeAOT*
          files: |
            *.deb
            *.exe
            *.zip
            *.pkg.tar.*
          fail_on_unmatched_files: false
          make_latest: true

      - name: Build summary
        if: always()
        run: |
          echo "## Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ubuntu apt (.deb) | ${{ needs.build-deb.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Windows .exe | ${{ needs.build-exe.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Arch pacman | ${{ needs.build-pacman.result }} |" >> "$GITHUB_STEP_SUMMARY"
