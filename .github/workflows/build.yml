name: Build Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.1.0)'
        default: '1.1.0'
        required: false

permissions:
  contents: write

env:
  RAW_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.event.inputs.version || '1.1.0') }}

jobs:
  # ── Debian .deb ──────────────────────────────────────────────────────
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot gcc g++

      - name: Build .deb
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh "${{ env.RAW_VERSION }}"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  # ── Windows .exe ─────────────────────────────────────────────────────
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Create entry script
        shell: pwsh
        run: |
          @"
          import sys, os
          # Ensure package is findable
          base = os.path.dirname(os.path.abspath(__file__))
          if hasattr(sys, '_MEIPASS'):
              base = sys._MEIPASS
          if base not in sys.path:
              sys.path.insert(0, base)
          from oynix.oynix import main
          main()
          "@ | Set-Content -Path "run_oynix.py" -Encoding UTF8

      - name: Build .exe
        run: |
          pyinstaller --onefile --name OyNIx `
            --add-data "oynix;oynix" `
            --hidden-import PyQt6.QtWebEngineWidgets `
            --hidden-import PyQt6.QtWebEngineCore `
            --hidden-import PyQt6.sip `
            run_oynix.py

      - name: Rename
        shell: pwsh
        run: |
          $v = "${{ env.RAW_VERSION }}" -replace '^v',''
          Move-Item dist/OyNIx.exe "OyNIx-${v}-windows.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: exe-package
          path: '*.exe'

  # ── Arch Linux pacman ────────────────────────────────────────────────
  build-pacman:
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - name: Install base tools
        run: pacman -Syu --noconfirm base-devel git

      - uses: actions/checkout@v4

      - name: Build pacman package
        run: |
          chmod +x scripts/build-pacman.sh
          ./scripts/build-pacman.sh "${{ env.RAW_VERSION }}"

      - uses: actions/upload-artifact@v4
        with:
          name: pacman-package
          path: '*.pkg.tar.*'
          if-no-files-found: warn

  # ── Release ──────────────────────────────────────────────────────────
  release:
    needs: [build-deb, build-exe, build-pacman]
    if: ${{ always() && !cancelled() && (needs.build-deb.result == 'success' || needs.build-exe.result == 'success' || needs.build-pacman.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List built artifacts
        run: ls -lh *.deb *.exe *.pkg.tar.* 2>/dev/null || echo "Some artifacts missing"

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OyNIx ${{ github.ref_name }}"
          body: |
            ## OyNIx Browser ${{ github.ref_name }}

            ### Downloads
            - **Debian/Ubuntu**: `.deb` package (install with `sudo dpkg -i`)
            - **Windows**: `.exe` standalone installer
            - **Arch Linux**: `.pkg.tar.zst` package (install with `sudo pacman -U`)

            ### What's New
            See commit history for changes.

            ---
            *Coded by Claude (Anthropic)*
          files: |
            *.deb
            *.exe
            *.pkg.tar.*
          fail_on_unmatched_files: false

      - name: Summary (non-tag builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "## Build Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in *.deb *.exe *.pkg.tar.*; do
            [ -f "$f" ] && echo "| $f | $(du -h "$f" | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*Download from the Actions artifacts above.*" >> "$GITHUB_STEP_SUMMARY"
