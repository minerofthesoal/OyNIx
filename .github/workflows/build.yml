name: Build Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.1.0)'
        default: '1.1.0'
        required: false

permissions:
  contents: write

jobs:
  # ── Compute version string ──────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Strip trailing periods/spaces that make invalid tags
            RAW="${{ github.ref_name }}"
            CLEAN="$(echo "$RAW" | sed 's/[. ]*$//')"
            echo "version=$CLEAN" >> "$GITHUB_OUTPUT"
          else
            echo "version=v${{ github.event.inputs.version || '1.1.0' }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Debian .deb ──────────────────────────────────────────────────────
  build-deb:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot gcc g++

      - name: Build .deb
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh "${{ needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  # ── Windows .exe ─────────────────────────────────────────────────────
  build-exe:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Create entry script
        shell: pwsh
        run: |
          @"
          import sys, os

          # PyInstaller support
          base = os.path.dirname(os.path.abspath(__file__))
          if hasattr(sys, '_MEIPASS'):
              base = sys._MEIPASS
          if base not in sys.path:
              sys.path.insert(0, base)

          # Windows: add Qt6 DLL path
          if sys.platform == 'win32':
              try:
                  import PyQt6
                  qt_bin = os.path.join(os.path.dirname(PyQt6.__file__), 'Qt6', 'bin')
                  if os.path.isdir(qt_bin):
                      os.environ['PATH'] = qt_bin + ';' + os.environ.get('PATH', '')
                      os.add_dll_directory(qt_bin)
                  qt_lib = os.path.join(os.path.dirname(PyQt6.__file__), 'Qt6', 'lib')
                  if os.path.isdir(qt_lib):
                      os.add_dll_directory(qt_lib)
              except Exception:
                  pass

          # CRITICAL: Set OpenGL context sharing before QApplication
          from PyQt6.QtWidgets import QApplication
          from PyQt6.QtCore import Qt
          try:
              QApplication.setAttribute(Qt.ApplicationAttribute.AA_ShareOpenGLContexts)
          except AttributeError:
              pass
          import PyQt6.QtWebEngineWidgets  # must be before QApplication

          from oynix.oynix import main
          main()
          "@ | Set-Content -Path "run_oynix.py" -Encoding UTF8

      - name: Locate QtWebEngineProcess
        shell: pwsh
        run: |
          $pyqt = python -c "import PyQt6; print(PyQt6.__path__[0])"
          echo "PyQt6 path: $pyqt"
          $proc = Get-ChildItem -Path $pyqt -Recurse -Filter "QtWebEngineProcess*" | Select-Object -First 1
          if ($proc) { echo "Found: $($proc.FullName)" }
          $res = Get-ChildItem -Path "$pyqt\Qt6\resources" -ErrorAction SilentlyContinue
          if ($res) { echo "Resources: $($res.Count) files" }

      - name: Build .exe
        shell: pwsh
        run: |
          $pyqt = python -c "import PyQt6; print(PyQt6.__path__[0])"
          $extraArgs = @()
          # Bundle QtWebEngineProcess
          $proc = Get-ChildItem -Path $pyqt -Recurse -Filter "QtWebEngineProcess.exe" | Select-Object -First 1
          if ($proc) {
            $extraArgs += "--add-binary"
            $extraArgs += "$($proc.FullName);PyQt6/Qt6/libexec"
          }
          # Bundle Qt6 resources (icudtl.dat, qtwebengine_resources etc.)
          $resDir = Join-Path $pyqt "Qt6\resources"
          if (Test-Path $resDir) {
            $extraArgs += "--add-data"
            $extraArgs += "${resDir};PyQt6/Qt6/resources"
          }
          # Bundle Qt6 translations
          $transDir = Join-Path $pyqt "Qt6\translations"
          if (Test-Path $transDir) {
            $extraArgs += "--add-data"
            $extraArgs += "${transDir};PyQt6/Qt6/translations"
          }
          pyinstaller --onefile --name OyNIx `
            --add-data "oynix;oynix" `
            --hidden-import PyQt6.QtWebEngineWidgets `
            --hidden-import PyQt6.QtWebEngineCore `
            --hidden-import PyQt6.QtWebEngineQuick `
            --hidden-import PyQt6.QtWebChannel `
            --hidden-import PyQt6.QtNetwork `
            --hidden-import PyQt6.QtPositioning `
            --hidden-import PyQt6.sip `
            --hidden-import PyQt6.QtSvg `
            @extraArgs `
            run_oynix.py

      - name: Rename
        shell: pwsh
        run: |
          $v = "${{ needs.prepare.outputs.version }}" -replace '^v',''
          Move-Item dist/OyNIx.exe "OyNIx-${v}-windows.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: exe-package
          path: '*.exe'

  # ── Flatpak ───────────────────────────────────────────────────────────
  build-flatpak:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install KDE runtime + SDK
        run: |
          flatpak install --user -y --noninteractive flathub \
            org.kde.Platform//6.7 \
            org.kde.Sdk//6.7

      - name: Build Flatpak
        run: |
          cd flatpak
          flatpak-builder --user --install-deps-from=flathub \
            --force-clean --disable-rofiles-fuse \
            build io.github.oynix.browser.yml

      - name: Export bundle
        run: |
          cd flatpak
          flatpak build-export repo build
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION="${VERSION#v}"
          flatpak build-bundle repo \
            "OyNIx-${VERSION}.flatpak" \
            io.github.oynix.browser
          mv "OyNIx-${VERSION}.flatpak" ../

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-package
          path: '*.flatpak'

  # ── Arch Linux pacman ────────────────────────────────────────────────
  build-pacman:
    needs: prepare
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel git python gcc

      - uses: actions/checkout@v4

      - name: Build pacman package
        run: |
          chmod +x scripts/build-pacman.sh
          ./scripts/build-pacman.sh "${{ needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: pacman-package
          path: '*.pkg.tar.*'
          if-no-files-found: warn

  # ── Release ──────────────────────────────────────────────────────────
  release:
    needs: [prepare, build-deb, build-exe, build-flatpak, build-pacman]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check if any build succeeded
        id: check
        run: |
          deb="${{ needs.build-deb.result }}"
          exe="${{ needs.build-exe.result }}"
          fpk="${{ needs.build-flatpak.result }}"
          pac="${{ needs.build-pacman.result }}"
          echo "deb=$deb exe=$exe flatpak=$fpk pac=$pac"
          if [ "$deb" = "success" ] || [ "$exe" = "success" ] || [ "$fpk" = "success" ] || [ "$pac" = "success" ]; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            echo "All builds failed, skipping release."
          fi

      - name: Download artifacts
        if: steps.check.outputs.has_artifacts == 'true'
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
        continue-on-error: true

      - name: List built artifacts
        if: steps.check.outputs.has_artifacts == 'true'
        run: ls -lh *.deb *.exe *.flatpak *.pkg.tar.* 2>/dev/null || echo "Some artifacts missing"

      - name: Create or get tag
        if: steps.check.outputs.has_artifacts == 'true'
        id: tag
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "OyNIx ${{ steps.tag.outputs.version }}"
          body: |
            ## OyNIx Browser ${{ steps.tag.outputs.version }}

            ### Downloads
            - **Debian/Ubuntu**: `.deb` package — `sudo dpkg -i oynix-*.deb`
            - **Windows**: `.exe` standalone binary
            - **Flatpak**: `.flatpak` bundle — `flatpak install --user OyNIx-*.flatpak`
            - **Arch Linux**: `.pkg.tar.zst` — `sudo pacman -U oynix-*.pkg.tar.zst`

            ---
            *Coded by Claude (Anthropic)*
          files: |
            *.deb
            *.exe
            *.flatpak
            *.pkg.tar.*
          fail_on_unmatched_files: false
          make_latest: true

      - name: Fail summary
        if: steps.check.outputs.has_artifacts != 'true'
        run: |
          echo "## Build Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "All platform builds failed. Check individual job logs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Debian | ${{ needs.build-deb.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Windows | ${{ needs.build-exe.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flatpak | ${{ needs.build-flatpak.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Arch | ${{ needs.build-pacman.result }} |" >> "$GITHUB_STEP_SUMMARY"
