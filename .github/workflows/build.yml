name: Build Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.1.0)'
        default: '1.1.0'
        required: false

permissions:
  contents: write

jobs:
  # ── Compute version string ──────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v${{ github.event.inputs.version || '1.1.0' }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Debian .deb ──────────────────────────────────────────────────────
  build-deb:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot gcc g++

      - name: Build .deb
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh "${{ needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  # ── Windows .exe ─────────────────────────────────────────────────────
  build-exe:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Create entry script
        shell: pwsh
        run: |
          @"
          import sys, os
          base = os.path.dirname(os.path.abspath(__file__))
          if hasattr(sys, '_MEIPASS'):
              base = sys._MEIPASS
          if base not in sys.path:
              sys.path.insert(0, base)
          from oynix.oynix import main
          main()
          "@ | Set-Content -Path "run_oynix.py" -Encoding UTF8

      - name: Build .exe
        run: |
          pyinstaller --onefile --name OyNIx `
            --add-data "oynix;oynix" `
            --hidden-import PyQt6.QtWebEngineWidgets `
            --hidden-import PyQt6.QtWebEngineCore `
            --hidden-import PyQt6.sip `
            run_oynix.py

      - name: Rename
        shell: pwsh
        run: |
          $v = "${{ needs.prepare.outputs.version }}" -replace '^v',''
          Move-Item dist/OyNIx.exe "OyNIx-${v}-windows.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: exe-package
          path: '*.exe'

  # ── Arch Linux pacman ────────────────────────────────────────────────
  build-pacman:
    needs: prepare
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel git python gcc

      - uses: actions/checkout@v4

      - name: Build pacman package
        run: |
          chmod +x scripts/build-pacman.sh
          ./scripts/build-pacman.sh "${{ needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: pacman-package
          path: '*.pkg.tar.*'
          if-no-files-found: warn

  # ── Release ──────────────────────────────────────────────────────────
  release:
    needs: [prepare, build-deb, build-exe, build-pacman]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check if any build succeeded
        id: check
        run: |
          deb="${{ needs.build-deb.result }}"
          exe="${{ needs.build-exe.result }}"
          pac="${{ needs.build-pacman.result }}"
          echo "deb=$deb exe=$exe pac=$pac"
          if [ "$deb" = "success" ] || [ "$exe" = "success" ] || [ "$pac" = "success" ]; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            echo "All builds failed, skipping release."
          fi

      - name: Download artifacts
        if: steps.check.outputs.has_artifacts == 'true'
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
        continue-on-error: true

      - name: List built artifacts
        if: steps.check.outputs.has_artifacts == 'true'
        run: ls -lh *.deb *.exe *.pkg.tar.* 2>/dev/null || echo "Some artifacts missing"

      - name: Create GitHub Release
        if: steps.check.outputs.has_artifacts == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OyNIx ${{ github.ref_name }}"
          body: |
            ## OyNIx Browser ${{ github.ref_name }}

            ### Downloads
            - **Debian/Ubuntu**: `.deb` package — `sudo dpkg -i oynix-*.deb`
            - **Windows**: `.exe` standalone binary
            - **Arch Linux**: `.pkg.tar.zst` — `sudo pacman -U oynix-*.pkg.tar.zst`

            ---
            *Coded by Claude (Anthropic)*
          files: |
            *.deb
            *.exe
            *.pkg.tar.*
          fail_on_unmatched_files: false

      - name: Summary (non-tag builds)
        if: steps.check.outputs.has_artifacts == 'true' && !startsWith(github.ref, 'refs/tags/')
        run: |
          echo "## Build Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in *.deb *.exe *.pkg.tar.*; do
            [ -f "$f" ] && echo "| $f | $(du -h "$f" | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*Download from the Actions artifacts above.*" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail summary
        if: steps.check.outputs.has_artifacts != 'true'
        run: |
          echo "## Build Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "All platform builds failed. Check individual job logs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Debian | ${{ needs.build-deb.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Windows | ${{ needs.build-exe.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Arch | ${{ needs.build-pacman.result }} |" >> "$GITHUB_STEP_SUMMARY"
