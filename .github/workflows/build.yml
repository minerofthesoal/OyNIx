name: Build Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '1.1.0-dev' }}

jobs:
  # ── Debian .deb ──────────────────────────────────────────────────────
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot
          pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onedir --name oynix \
            --add-data "oynix:oynix" \
            --hidden-import PyQt6.QtWebEngineWidgets \
            --hidden-import PyQt6.QtWebEngineCore \
            oynix/oynix.py

      - name: Package .deb
        run: |
          VERSION="${APP_VERSION#v}"
          PKG="oynix_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/lib/oynix"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"

          cp -r dist/oynix/* "${PKG}/usr/lib/oynix/"

          printf '#!/bin/bash\nexec /usr/lib/oynix/oynix "$@"\n' \
            > "${PKG}/usr/bin/oynix"
          chmod +x "${PKG}/usr/bin/oynix"

          cat > "${PKG}/usr/share/applications/oynix.desktop" <<EOF
          [Desktop Entry]
          Name=OyNIx Browser
          Comment=Nyx-themed browser with local AI
          Exec=oynix
          Type=Application
          Categories=Network;WebBrowser;
          EOF
          sed -i 's/^          //' "${PKG}/usr/share/applications/oynix.desktop"

          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: oynix
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: OyNIx Project
          Description: Nyx-themed desktop browser with local AI assistant
           Custom Firefox-inspired browser with tree tabs, local LLM,
           auto-indexing Nyx search engine, and purple/black theme.
          Depends: libgl1, libxkbcommon0, libnss3, libxcomposite1
          EOF
          sed -i 's/^          //' "${PKG}/DEBIAN/control"

          dpkg-deb --build "${PKG}"
          mv "${PKG}.deb" "oynix-${VERSION}-amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  # ── Windows .exe ─────────────────────────────────────────────────────
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --onefile --name OyNIx `
            --add-data "oynix;oynix" `
            --hidden-import PyQt6.QtWebEngineWidgets `
            --hidden-import PyQt6.QtWebEngineCore `
            oynix/oynix.py

      - name: Rename artifact
        run: Move-Item dist/OyNIx.exe "OyNIx-${{ env.APP_VERSION }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: exe-package
          path: '*.exe'

  # ── Arch Linux pacman ────────────────────────────────────────────────
  build-pacman:
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm base-devel python python-pip git \
            python-pyqt6 python-pyqt6-webengine qt6-webengine 2>/dev/null || \
          pacman -Syu --noconfirm base-devel python python-pip git

      - uses: actions/checkout@v4

      - name: Install Python deps via pip
        run: pip install --break-system-packages -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --name oynix \
            --add-data "oynix:oynix" \
            --hidden-import PyQt6.QtWebEngineWidgets \
            --hidden-import PyQt6.QtWebEngineCore \
            oynix/oynix.py

      - name: Create PKGBUILD
        run: |
          mkdir -p pkg
          PKGVER=$(echo "${APP_VERSION#v}" | tr -c '[:alnum:].' '.')
          cat > pkg/PKGBUILD <<EOF
          pkgname=oynix
          pkgver=${PKGVER}
          pkgrel=1
          pkgdesc="Nyx-themed desktop browser with local AI assistant"
          arch=('x86_64')
          depends=('python')
          makedepends=()

          package() {
            install -dm755 "\$pkgdir/usr/lib/oynix"
            cp -r "\$startdir/../dist/oynix/"* "\$pkgdir/usr/lib/oynix/"

            install -dm755 "\$pkgdir/usr/bin"
            printf '#!/bin/bash\nexec /usr/lib/oynix/oynix "\$@"\n' \
              > "\$pkgdir/usr/bin/oynix"
            chmod +x "\$pkgdir/usr/bin/oynix"

            install -dm755 "\$pkgdir/usr/share/applications"
            printf '[Desktop Entry]\nName=OyNIx Browser\nComment=Nyx-themed browser with local AI\nExec=oynix\nType=Application\nCategories=Network;WebBrowser;\n' \
              > "\$pkgdir/usr/share/applications/oynix.desktop"
          }
          EOF
          sed -i 's/^          //' pkg/PKGBUILD

      - name: Build package
        run: |
          cd pkg
          useradd -m builder 2>/dev/null || true
          chown -R builder:builder . .. ../dist
          su builder -c "makepkg -sf --noconfirm --skipinteg"

      - name: Collect artifact
        run: |
          cp pkg/*.pkg.tar.zst "oynix-${APP_VERSION}.pkg.tar.zst" 2>/dev/null || \
          cp pkg/*.pkg.tar.xz "oynix-${APP_VERSION}.pkg.tar.xz" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: pacman-package
          path: 'oynix-*pkg*'
          if-no-files-found: warn

  # ── Create GitHub Release ────────────────────────────────────────────
  release:
    needs: [build-deb, build-exe, build-pacman]
    if: ${{ always() && !cancelled() && (needs.build-deb.result == 'success' || needs.build-exe.result == 'success' || needs.build-pacman.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create release (tag push)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.exe
            *.pkg*
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Upload summary (manual run)
        if: github.ref_type != 'tag'
        run: |
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh *.deb *.exe *.pkg* 2>/dev/null || echo "See uploaded artifacts"
          echo '```' >> $GITHUB_STEP_SUMMARY
